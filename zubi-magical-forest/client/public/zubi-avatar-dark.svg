<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C95D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F7A5F;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGradient">
      <stop offset="0%" style="stop-color:#1a4d3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#081410;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" stroke="url(#avatarGradient)" stroke-width="2"/>
  
  <!-- Magical creature body -->
  <g transform="translate(50, 50)">
    <!-- Body -->
    <ellipse cx="0" cy="5" rx="22" ry="18" fill="url(#avatarGradient)" opacity="0.9"/>
    
    <!-- Head -->
    <circle cx="0" cy="-12" r="16" fill="url(#avatarGradient)"/>
    
    <!-- Magical horns/antlers -->
    <path d="M-8,-20 L-6,-15 L-4,-18 M8,-20 L6,-15 L4,-18" stroke="#F4C95D" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Eyes -->
    <circle cx="-5" cy="-12" r="2" fill="#081410"/>
    <circle cx="5" cy="-12" r="2" fill="#081410"/>
    <circle cx="-4.5" cy="-12.5" r="0.8" fill="#F4C95D"/>
    <circle cx="4.5" cy="-12.5" r="0.8" fill="#F4C95D"/>
    
    <!-- Magical glow around eyes -->
    <circle cx="-5" cy="-12" r="3" fill="none" stroke="#F4C95D" stroke-width="0.5" opacity="0.6"/>
    <circle cx="5" cy="-12" r="3" fill="none" stroke="#F4C95D" stroke-width="0.5" opacity="0.6"/>
    
    <!-- Smile -->
    <path d="M-6,-8 Q0,-6 6,-8" stroke="#081410" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    
    <!-- Magical sparkles on body -->
    <circle cx="-8" cy="2" r="1.5" fill="#F4C95D" opacity="0.8"/>
    <circle cx="10" cy="0" r="1" fill="#F4C95D" opacity="0.6"/>
    <circle cx="0" cy="8" r="1.2" fill="#F4C95D" opacity="0.7"/>
    
    <!-- Cute ears -->
    <circle cx="-14" cy="-15" r="4" fill="url(#avatarGradient)" opacity="0.8"/>
    <circle cx="14" cy="-15" r="4" fill="url(#avatarGradient)" opacity="0.8"/>
    <circle cx="-14" cy="-15" r="2" fill="#2F7A5F" opacity="0.6"/>
    <circle cx="14" cy="-15" r="2" fill="#2F7A5F" opacity="0.6"/>
  </g>
  
  <!-- Outer magical ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#avatarGradient)" stroke-width="1" opacity="0.4"/>
</svg>
