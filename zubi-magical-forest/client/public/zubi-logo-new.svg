<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C95D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F7A5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C95D;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2F7A5F;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with glow -->
  <circle cx="24" cy="24" r="22" fill="url(#glowGradient)" opacity="0.4"/>
  <circle cx="24" cy="24" r="20" fill="#081410" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Magical forest tree icon -->
  <g transform="translate(24, 24)">
    <!-- Tree trunk -->
    <rect x="-3" y="2" width="6" height="8" fill="#8B4513" rx="1"/>
    
    <!-- Tree crown -->
    <circle cx="0" cy="-2" r="8" fill="url(#logoGradient)" opacity="0.9"/>
    <circle cx="-4" cy="-4" r="5" fill="#2F7A5F" opacity="0.7"/>
    <circle cx="4" cy="-3" r="6" fill="#2F7A5F" opacity="0.7"/>
    
    <!-- Stars around tree -->
    <circle cx="-10" cy="-8" r="1" fill="#F4C95D" opacity="0.8"/>
    <circle cx="8" cy="-10" r="1.5" fill="#F4C95D" opacity="0.6"/>
    <circle cx="12" cy="2" r="1" fill="#F4C95D" opacity="0.7"/>
    
    <!-- Magical sparkles -->
    <path d="M-6,-6 L-5,-5 L-4,-6 L-5,-7 Z" fill="#F4C95D" opacity="0.9"/>
    <path d="M6,4 L7,5 L8,4 L7,3 Z" fill="#F4C95D" opacity="0.8"/>
  </g>
  
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.6"/>
</svg>
