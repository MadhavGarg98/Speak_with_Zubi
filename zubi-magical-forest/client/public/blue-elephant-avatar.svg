<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue cute elephant -->
  <circle cx="50" cy="50" r="48" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
  
  <!-- Elephant body -->
  <ellipse cx="50" cy="55" rx="25" ry="20" fill="#5BA0F2"/>
  
  <!-- Elephant head -->
  <circle cx="50" cy="35" r="18" fill="#6BB6FF"/>
  
  <!-- Ears -->
  <path d="M 32 30 Q 25 25 28 35 Q 32 40 35 35" fill="#4A90E2"/>
  <path d="M 68 30 Q 75 25 72 35 Q 68 40 65 35" fill="#4A90E2"/>
  
  <!-- Trunk -->
  <path d="M 50 45 Q 48 55 50 60 Q 52 55 50 45" fill="#5BA0F2" stroke="#4A90E2" stroke-width="1"/>
  
  <!-- Eyes -->
  <circle cx="44" cy="33" r="2" fill="#000"/>
  <circle cx="56" cy="33" r="2" fill="#000"/>
  <circle cx="44.5" cy="32.5" r="0.5" fill="#FFF"/>
  <circle cx="56.5" cy="32.5" r="0.5" fill="#FFF"/>
  
  <!-- Cute smile -->
  <path d="M 45 40 Q 50 42 55 40" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Cheek blush -->
  <circle cx="38" cy="38" r="3" fill="#FFB3BA" opacity="0.5"/>
  <circle cx="62" cy="38" r="3" fill="#FFB3BA" opacity="0.5"/>
</svg>
